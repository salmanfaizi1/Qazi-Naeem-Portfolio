<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Artist Portfolio</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <section class="hero">
    <div class="hero-content">
        <h1>Qazi Naeem Iqbal</h1>
        
        <h2 class="sub-title">Relief and Sculptural Artist</h2>

        <div class="bio-text">
            </div>

        <div class="contact-info">
            <span>0346-4828282</span> | <span>0311-6729495</span>
        </div>

        <a href="#gallery-section" class="scroll-arrow">
            Explore Gallery <br> ↓
        </a>
    </div>
</section>

    <main id="gallery-section" class="container">
        <div id="gallery-grid" class="portfolio-grid">
            </div>
    </main>

    <div id="image-modal" class="modal">
        <span class="close-btn">&times;</span>
        <div class="modal-content-wrapper">
            <img id="modal-img" src="" alt="Full View">
            <div class="controls">
                <button id="zoom-out">Zoom -</button>
                <button id="reset-zoom">Reset</button>
                <button id="zoom-in">Zoom +</button>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
